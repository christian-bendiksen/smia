# Astral-specific override for helix.toml.tpl.
# The template uses color8 for popup and cursor-line backgrounds and dim text.
# This override assigns a separate color to each role.

"ui.background"                    = { bg = "background" }
"ui.background.separator"          = { fg = "color8" }

"ui.text"                          = { fg = "color7" }
"ui.text.focus"                    = { fg = "color11", modifiers = ["bold"] }

"ui.linenr"                        = { fg = "muted" }
"ui.linenr.selected"               = { fg = "color7", modifiers = ["bold"] }

"ui.cursor"                        = { modifiers = ["reversed"] }
"ui.cursor.primary"                = { modifiers = ["reversed"] }
"ui.cursor.secondary"              = { modifiers = ["reversed"] }
"ui.cursor.match"                  = { fg = "color3", underline = { color = "color3", style = "line" } }

"ui.cursorline.primary"            = { bg = "surface_high" }
"ui.cursorline.secondary"          = { bg = "surface_high" }

"ui.selection"                     = { bg = "indigo" }
"ui.selection.primary"             = { fg = "selection_foreground", bg = "selection_background" }

"ui.statusline"                    = { fg = "color7", bg = "surface" }
"ui.statusline.inactive"           = { fg = "muted", bg = "surface" }
"ui.statusline.normal"             = { fg = "color0", bg = "accent" }
"ui.statusline.insert"             = { fg = "color0", bg = "color2" }
"ui.statusline.select"             = { fg = "color0", bg = "color4" }
"ui.statusline.separator"          = { fg = "color8" }

"ui.popup"                         = { fg = "color7", bg = "overlay" }
"ui.popup.info"                    = { fg = "color7", bg = "overlay" }
"ui.window"                        = { fg = "color4" }
"ui.help"                          = { fg = "color7", bg = "overlay" }

"ui.menu"                          = { fg = "color7", bg = "overlay" }
"ui.menu.selected"                 = { fg = "color0", bg = "accent" }
"ui.menu.scroll"                   = { fg = "muted", bg = "overlay" }

"ui.gutter"                        = { fg = "color8" }
"ui.virtual.ruler"                 = { bg = "surface" }
"ui.virtual.whitespace"            = { fg = "color8" }
"ui.virtual.indent-guide"          = { fg = "color8" }
"ui.virtual.wrap"                  = { fg = "color8" }

"ui.virtual.inlay-hint"            = { fg = "muted", bg = "surface_high" }
"ui.virtual.inlay-hint.parameter"  = { fg = "muted", bg = "surface_high" }
"ui.virtual.inlay-hint.type"       = { fg = "muted", bg = "surface_high" }

"ui.virtual.jump-label"            = { fg = "color3", modifiers = ["bold", "underlined"] }

"comment"                          = { fg = "color5", modifiers = ["italic"] }

"variable"                         = { fg = "color7" }
"variable.other.member"            = { fg = "color6" }

"constant"                         = { fg = "color3" }
"constant.numeric"                 = { fg = "color3" }
"constant.character.escape"        = { fg = "color14" }

"string"                           = { fg = "color2" }

"type"                             = { fg = "color11" }
"attribute"                        = { fg = "color4" }

"function"                         = { fg = "color12" }
"constructor"                      = { fg = "color12" }
"special"                          = { fg = "color6" }

"keyword"                          = { fg = "color13" }
"label"                            = { fg = "color13" }
"namespace"                        = { fg = "color5" }

"operator"                         = { fg = "color5" }
"punctuation"                      = { fg = "muted" }

"markup.heading"                   = { fg = "color11", modifiers = ["bold"] }
"markup.list"                      = { fg = "color3" }
"markup.bold"                      = { fg = "color11", modifiers = ["bold"] }
"markup.italic"                    = { fg = "color5", modifiers = ["italic"] }
"markup.strikethrough"             = { modifiers = ["crossed_out"] }

"markup.link.url"                  = { fg = "color3", underline = { color = "color3", style = "line" } }
"markup.link.text"                 = { fg = "color2" }

"markup.quote"                     = { fg = "color6" }
"markup.raw"                       = { fg = "color2" }

"diff.plus"                        = { fg = "color2" }
"diff.minus"                       = { fg = "color1" }
"diff.delta"                       = { fg = "color6" }
"diff.delta.moved"                 = { fg = "color4" }

"warning"                          = { fg = "color3" }
"error"                            = { fg = "color1" }
"info"                             = { fg = "color6" }
"hint"                             = { fg = "muted" }

"diagnostic.warning"               = { underline = { color = "color3", style = "curl" } }
"diagnostic.error"                 = { underline = { color = "color1", style = "curl" } }
"diagnostic.info"                  = { underline = { color = "color6", style = "dotted" } }
"diagnostic.hint"                  = { underline = { color = "muted", style = "double_line" } }

[palette]
background           = "#0f111a"
foreground           = "#c8d3f5"
accent               = "#82aaff"
selection_foreground = "#0f111a"
selection_background = "#82aaff"

surface      = "#161928"
surface_high = "#1e2235"
overlay      = "#262b42"
muted        = "#828bb8"
indigo       = "#2d3f76"

color0  = "#1b1e2d"
color1  = "#ff757f"
color2  = "#c3e88d"
color3  = "#ffc777"
color4  = "#82aaff"
color5  = "#c099ff"
color6  = "#86e1fc"
color7  = "#c8d3f5"
color8  = "#444a73"
color9  = "#ff8d94"
color10 = "#c7fb6d"
color11 = "#ffd8ab"
color12 = "#9ab8ff"
color13 = "#caabff"
color14 = "#b2ebff"
color15 = "#ffffff"
