name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Malm v0.3.2, required by malm.kdl. Keep third-party sources pinned to full SHAs.
env:
  MALM_REF: 5ebde9d84c9c3c7733b5a0402bde213071b41c37

jobs:
  workspace:
    name: workspace and shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: reject whitespace errors
        run: |
          git diff --check
          git show --check --format= HEAD
      - name: install shellcheck
        run: sudo apt-get update -q && sudo apt-get install -qy shellcheck
      - name: validate shell
        run: |
          bash -n \
            malm/modules/base/bin/* \
            malm/modules/base/tests/*.bash \
            malm/modules/shell/*.bash \
            malm/modules/screenshot/parts/*.sh \
            system-models/malm/modules/cli/smia \
            system-models/malm/modules/system-model/smia-system-model \
            system-models/tests/*.bash
          shellcheck -S warning \
            malm/modules/base/bin/* \
            system-models/malm/modules/cli/smia \
            system-models/malm/modules/system-model/smia-system-model
          shellcheck -S warning -s bash \
            malm/modules/base/tests/*.bash \
            malm/modules/shell/*.bash \
            system-models/tests/*.bash
      - name: shell behavior tests
        run: |
          bash malm/modules/base/tests/smia-cli.bash
          bash malm/modules/base/tests/smia-menu.bash
          bash malm/modules/base/tests/smia-session.bash

  discover:
    name: discover selectable profiles
    runs-on: ubuntu-latest
    outputs:
      profiles: ${{ steps.profiles.outputs.profiles }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: dotfiles
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: christian-bendiksen/malm
          ref: ${{ env.MALM_REF }}
          path: malm-src
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.8.0
        with:
          workspaces: malm-src
      - run: cargo build --locked --release --manifest-path malm-src/Cargo.toml
      - name: check configurations and installer
        run: |
          export PATH="$GITHUB_WORKSPACE/malm-src/target/release:$PATH"
          malm check --repo dotfiles --all-profiles
          malm --repo dotfiles/system-models --state smia-system-models check --all-profiles
          bash dotfiles/system-models/tests/smia-install.bash
      - id: profiles
        run: |
          malm_bin="$GITHUB_WORKSPACE/malm-src/target/release/malm"
          profile_rows="$("$malm_bin" --repo dotfiles --json profiles --selectable)"
          profiles="$(python3 -c 'import json, sys; print(json.dumps([row["name"] for row in json.load(sys.stdin)]))' <<<"$profile_rows")"
          [[ "$profiles" != "[]" ]]
          printf 'profiles=%s\n' "$profiles" >>"$GITHUB_OUTPUT"

  render:
    name: render ${{ matrix.profile }}
    needs: [workspace, discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJSON(needs.discover.outputs.profiles) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: dotfiles
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: christian-bendiksen/malm
          ref: ${{ env.MALM_REF }}
          path: malm-src
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.95.0
      - uses: Swatinem/rust-cache@8cbdedb5103daa674dcf46d3590fe06a76645684 # v2.8.0
        with:
          workspaces: malm-src
      - name: check sibling workspace layout
        run: |
          test -f dotfiles/malm.kdl
          test -f malm-src/Cargo.toml
          test ! -e dotfiles/malm-src
      - run: cargo build --locked --release --manifest-path malm-src/Cargo.toml
      - name: render without apply
        run: |
          export PATH="$GITHUB_WORKSPACE/malm-src/target/release:$PATH"
          malm \
            --repo dotfiles \
            --profile "${{ matrix.profile }}" \
            render --output "$RUNNER_TEMP/render-${{ matrix.profile }}"
